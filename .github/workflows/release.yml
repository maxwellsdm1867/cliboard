name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: cliboard v${{ steps.get_version.outputs.version }}
          body: |
            ## Install

            **Shell (Mac/Linux):**
            ```bash
            curl -fsSL https://github.com/maxwellsdm1867/cliboard/releases/download/v${{ steps.get_version.outputs.version }}/cliboard-installer.sh | sh
            ```

            **Cargo:**
            ```bash
            cargo install cliboard
            ```

            **Manual:** Download the binary for your platform below.
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cliboard-${{ matrix.target }}.tar.gz cliboard
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cliboard-${{ matrix.target }}.zip cliboard.exe
          cd ../../..
        shell: bash

      - name: Upload Release Asset (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: cliboard-${{ matrix.target }}.tar.gz
          asset_name: cliboard-${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Release Asset (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: cliboard-${{ matrix.target }}.zip
          asset_name: cliboard-${{ matrix.target }}.zip
          asset_content_type: application/zip

  installer-script:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Create installer script
        run: |
          cat > cliboard-installer.sh << 'INSTALLER'
          #!/bin/sh
          set -e

          REPO="maxwellsdm1867/cliboard"

          # Detect platform
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)

          case "$OS" in
            linux)  OS_TARGET="unknown-linux-gnu" ;;
            darwin) OS_TARGET="apple-darwin" ;;
            *)      echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          case "$ARCH" in
            x86_64|amd64)  ARCH_TARGET="x86_64" ;;
            aarch64|arm64) ARCH_TARGET="aarch64" ;;
            *)             echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          TARGET="${ARCH_TARGET}-${OS_TARGET}"

          # Get latest version
          VERSION=$(curl -fsSL "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')

          if [ -z "$VERSION" ]; then
            echo "Failed to get latest version"
            exit 1
          fi

          echo "Installing cliboard v${VERSION} (${TARGET})..."

          URL="https://github.com/$REPO/releases/download/v${VERSION}/cliboard-${TARGET}.tar.gz"
          TMP=$(mktemp -d)

          curl -fsSL "$URL" | tar xz -C "$TMP"

          # Install to ~/.cargo/bin or /usr/local/bin
          if [ -d "$HOME/.cargo/bin" ]; then
            INSTALL_DIR="$HOME/.cargo/bin"
          else
            INSTALL_DIR="/usr/local/bin"
          fi

          mv "$TMP/cliboard" "$INSTALL_DIR/cliboard"
          chmod +x "$INSTALL_DIR/cliboard"
          rm -rf "$TMP"

          echo "Installed cliboard v${VERSION} to ${INSTALL_DIR}/cliboard"
          echo "Run 'cliboard new \"My Derivation\"' to get started."
          INSTALLER
          chmod +x cliboard-installer.sh

      - name: Upload installer script
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: cliboard-installer.sh
          asset_name: cliboard-installer.sh
          asset_content_type: application/x-sh
